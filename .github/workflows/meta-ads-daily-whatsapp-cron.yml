# סיכום הוצאה יומי (Meta Ads, date_preset=today) → Green API
#
# ב-Vercel: CRON_SECRET, integrationSettings (Meta Ads + Green API) ב-Firestore, או CRON_METRICS_FIRESTORE_DATABASE_ID
# Secrets: CRM_SITE_URL, CRON_SECRET

name: Meta Ads daily spend summary (WhatsApp, every 20m)

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: POST meta-ads-daily-summary
        env:
          CRM_SITE_URL: ${{ secrets.CRM_SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "${CRM_SITE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::notice::דילוג: הגדר secrets CRM_SITE_URL ו-CRON_SECRET"
            exit 0
          fi
          BASE="${CRM_SITE_URL%/}"
          curl -sS -f -X POST -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE}/api/cron/meta-ads-daily-summary"
