# Push to main → POST ל-Vercel Deploy Hook (branch main).
#
# Secret אחד ב-GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_DEPLOY_HOOK_URL — מ-Vercel → Project → Settings → Git → Deploy Hooks

name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Context (debug)
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

      - name: Deploy (hook)
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -e
          HOOK_TRIM=$(printf '%s' "${HOOK_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$HOOK_TRIM" ]; then
            echo "::error::חסר secret VERCEL_DEPLOY_HOOK_URL"
            exit 1
          fi
          echo ">>> POST Deploy Hook (${#HOOK_TRIM} chars)"
          HTTP=$(curl -sS -o /tmp/hook_body.out -w "%{http_code}" -X POST "$HOOK_TRIM")
          echo ">>> HTTP: $HTTP"
          if [ -f /tmp/hook_body.out ]; then cat /tmp/hook_body.out; fi
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ] && [ "$HTTP" != "204" ]; then
            echo "::error::Deploy hook returned HTTP $HTTP"
            exit 1
          fi
          echo ">>> OK"
