# Push to main → קורא ל-Vercel Deploy Hook אומריץ vercel deploy (בלי תלות ב-Git App של Vercel).
#
# Secrets ב-GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_DEPLOY_HOOK_URL  (מומלץ) — URL מלא מ-Vercel → Project → Settings → Git → Deploy Hooks, branch main
#   או: VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID

name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Context (debug)
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy (hook or CLI)
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          # ניקוי רווחים/שורה מהדבקה ב-GitHub Secrets
          HOOK_TRIM=$(printf '%s' "${HOOK_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          if [ -n "$HOOK_TRIM" ]; then
            echo ">>> Using Deploy Hook (length ${#HOOK_TRIM} chars)"
            HTTP=$(curl -sS -o /tmp/hook_body.out -w "%{http_code}" -X POST "$HOOK_TRIM")
            echo ">>> HTTP status: $HTTP"
            if [ -f /tmp/hook_body.out ]; then cat /tmp/hook_body.out; fi
            if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ] && [ "$HTTP" != "204" ]; then
              echo "::error::Deploy hook returned HTTP $HTTP — בדוק ב-Vercel שה-hook עדיין קיים ושה-URL ב-secret תואם בדיוק."
              exit 1
            fi
            echo ">>> Hook accepted"
            exit 0
          fi

          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            echo ">>> Using Vercel CLI"
            mkdir -p .vercel
            node -e "require('fs').writeFileSync('.vercel/project.json', JSON.stringify({orgId:process.env.VERCEL_ORG_ID, projectId:process.env.VERCEL_PROJECT_ID}))"
            npx --yes vercel@latest deploy --prod --token "$VERCEL_TOKEN"
            exit 0
          fi

          echo "::error::חסר VERCEL_DEPLOY_HOOK_URL ב-secrets, או שלושת VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID"
          exit 1
